version: "3.9"

# ─────────────────────────────────────────────────────────────────
# ExpensIQ — Docker Compose
# Start everything:  docker compose up --build
# ─────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: expensiq-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       expensiq
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible local file storage) ─────────────────
  minio:
    image: minio/minio:latest
    container_name: expensiq-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expensiq-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      APP_ENV:            development
      DATABASE_URL:       postgresql://postgres:postgres@db:5432/expensiq
      STORAGE_BACKEND:    s3
      S3_BUCKET:          expensiq-receipts
      S3_ENDPOINT:        http://minio:9000
      AWS_ACCESS_KEY_ID:  minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      DEV_MODE:           "true"
      OCR_PROVIDER:       ${OCR_PROVIDER:-mock}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY:-}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:-}
      BANKING_PROVIDER:   mock
      CORS_ORIGINS:       '["*"]'
    volumes:
      - ./backend:/app
      - ./dashboard.html:/dashboard.html:ro
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers --forwarded-allow-ips=*

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expensiq-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_DEV_MODE: "true"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "3000:3000"

  # ── Metabase (BI / Analytics) ─────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: expensiq-metabase
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MB_DB_TYPE:    postgres
      MB_DB_DBNAME:  expensiq
      MB_DB_PORT:    5432
      MB_DB_USER:    postgres
      MB_DB_PASS:    postgres
      MB_DB_HOST:    db
    ports:
      - "3100:3000"   # Metabase UI at http://localhost:3100

volumes:
  pg_data:
  minio_data:
