    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

    .toast-in { animation: fadeIn 0.25s ease; }
    .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:9999px; font-size:11px; font-weight:600; letter-spacing:0.02em; }

<body class="bg-slate-50 text-slate-800 antialiased">
  <div id="root"><p style="padding:40px;font-family:monospace;color:#666">Cargando ExpensIQ…</p></div>

<script>
window.onerror = function(msg, url, line, col, error) {
  document.getElementById('root').innerHTML = '<div style="padding:40px;font-family:monospace"><h2 style="color:red">Error JS</h2><p>' + msg + '</p><p>Línea: ' + line + '</p><pre style="background:#f5f5f5;padding:16px;border-radius:8px;white-space:pre-wrap;max-height:400px;overflow:auto">' + (error ? error.stack : '') + '</pre></div>';
  return true;
};
</script>

const API = 'http://localhost:8000/api/v1';

// ─── API Client ────────────────────────────────────────────────────────────
const api = {
  get:    (p)    => fetch(`${API}${p}`).then(r => { if(!r.ok) throw new Error(r.status); return r.json(); }),
  post:   (p, b) => fetch(`${API}${p}`, { method:'POST',  headers:{'Content-Type':'application/json'}, body: JSON.stringify(b) }).then(r => r.json()),
  patch:  (p, b) => fetch(`${API}${p}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(b) }).then(r => r.json()),
  del:    (p)    => fetch(`${API}${p}`, { method:'DELETE' }).then(r => r.ok),
  upload: (p, f) => fetch(`${API}${p}`, { method:'POST', body: f }).then(r => r.json()),
};

// ─── Formatters ────────────────────────────────────────────────────────────
const fmt = {
  money: (n, cur='EUR') => new Intl.NumberFormat('es-ES', { style:'currency', currency: cur, minimumFractionDigits:2 }).format(n || 0),
  date:  (d) => d ? new Intl.DateTimeFormat('es-ES', { day:'2-digit', month:'short', year:'numeric' }).format(new Date(d)) : '—',
  rel:   (d) => {
    if (!d) return '—';
    const days = Math.floor((Date.now() - new Date(d)) / 86400000);
    if (days === 0) return 'Hoy';
    if (days === 1) return 'Ayer';
    if (days < 7)  return `Hace ${days}d`;
    return fmt.date(d);
  },
  pct: (n) => `${Math.round(n * 100)}%`,
};

function Icon({ name, size = 20, className = '' }) {
  const d = ICON_PATHS[name];
  if (!d) return null;
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" width={size} height={size} className={className} style={{display:'inline-block',verticalAlign:'middle'}}>
      <path d={d} />
    </svg>
  );
}

  processing: { label:'Procesando', bg:'bg-blue-50',     text:'text-blue-600',    dot:'bg-blue-400'    },

};

// ─── Toast ─────────────────────────────────────────────────────────────────
let _toast = null;
function ToastContainer() {
  const [list, setList] = useState([]);
  useEffect(() => {
    _toast = (msg, type='info') => {
      const id = Date.now();
      setList(p => [...p, { id, msg, type }]);
      setTimeout(() => setList(p => p.filter(t => t.id !== id)), 3500);
    };
  }, []);
  const CFG = { success:{bg:'bg-emerald-500',icon:'✓'}, error:{bg:'bg-red-500',icon:'✕'}, info:{bg:'bg-slate-700',icon:'ℹ'}, warning:{bg:'bg-amber-500',icon:'⚠'} };
  return (
    <div className="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
      {list.map(t => {
        const c = CFG[t.type] || CFG.info;
        return (
          <div key={t.id} className={`toast-in flex items-center gap-3 px-4 py-3 rounded-xl text-white text-sm shadow-xl pointer-events-auto ${c.bg}`}>
            <span className="w-5 h-5 rounded-full bg-white/20 flex items-center justify-center text-xs font-bold flex-shrink-0">{c.icon}</span>
            <span>{t.msg}</span>
          </div>
        );
      })}
    </div>
  );
}
const toast = { success: m => _toast?.(m,'success'), error: m => _toast?.(m,'error'), info: m => _toast?.(m,'info'), warn: m => _toast?.(m,'warning') };

// ─── UI Atoms ─────────────────────────────────────────────────────────────
function Spinner({ size='sm', color='text-indigo-500' }) {
  const s = size === 'lg' ? 'w-7 h-7' : size === 'md' ? 'w-5 h-5' : 'w-4 h-4';
  return (
    <svg className={`spin ${s} ${color}`} fill="none" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" className="opacity-20"/>
      <path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z" className="opacity-75"/>
    </svg>
  );
}

function StatusBadge({ status }) {
  const c = STATUS_CFG[status] || STATUS_CFG.pending;
  return (
    <span className={`badge ${c.bg} ${c.text}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>
      {c.label}
    </span>
  );
}

function Card({ children, className = '', onClick }) {
  return (
    <div onClick={onClick} className={`bg-white rounded-2xl border border-slate-200/80 shadow-sm ${onClick ? 'cursor-pointer' : ''} ${className}`}>
      {children}
    </div>
  );
}

function SectionHeader({ title, subtitle, action }) {
  return (
    <div className="flex items-center justify-between mb-5">
      <div>
        <h2 className="text-base font-semibold text-slate-800">{title}</h2>
        {subtitle && <p className="text-xs text-slate-400 mt-0.5">{subtitle}</p>}
      </div>
      {action}
    </div>
  );
}

function Btn({ children, onClick, disabled, variant='primary', size='md', loading }) {
  const base = `inline-flex items-center gap-2 font-medium rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed`;
  const sz = { sm:'px-3 py-1.5 text-xs', md:'px-4 py-2 text-sm', lg:'px-5 py-2.5 text-sm' }[size];
  const v = {
    primary:   'bg-indigo-500 hover:bg-indigo-600 active:bg-indigo-700 text-white shadow-sm shadow-indigo-200',
    secondary: 'bg-white hover:bg-slate-50 border border-slate-200 text-slate-700',
    danger:    'bg-red-50 hover:bg-red-100 text-red-600 border border-red-200',
    ghost:     'text-slate-600 hover:bg-slate-100',
  }[variant];
  return (
    <button onClick={onClick} disabled={disabled || loading} className={`${base} ${sz} ${v}`}>
      {loading && <Spinner size="sm" color={variant === 'primary' ? 'text-white' : 'text-slate-400'} />}
      {children}
    </button>
  );
}

function EmptyState({ icon, title, desc }) {
  return (
    <div className="flex flex-col items-center justify-center py-16 px-4 text-center">
      <div className="mb-4 text-slate-300">{icon}</div>
      <p className="font-semibold text-slate-600 mb-1">{title}</p>
      <p className="text-sm text-slate-400 max-w-xs">{desc}</p>
    </div>
  );
}

function SkeletonRow({ cols = 5 }) {
  return [...Array(5)].map((_, i) => (
    <tr key={i}>
      {[...Array(cols)].map((_, j) => (
        <td key={j} className="px-4 py-3">
          <div className="h-3.5 bg-slate-100 rounded-full animate-pulse" style={{ width: `${50 + (j * 13 + i * 7) % 40}%` }}></div>
        </td>
      ))}
    </tr>
  ));
}

function Table({ headers, children, loading, empty }) {
  return (
    <div className="overflow-x-auto">
      <table className="w-full">
        <thead>
          <tr className="bg-slate-50/80 border-b border-slate-100">
            {headers.map(h => (
              <th key={h} className="text-left px-4 py-3 text-xs font-semibold text-slate-400 uppercase tracking-wider whitespace-nowrap">{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {loading  ? <SkeletonRow cols={headers.length} /> :
           empty    ? <tr><td colSpan={headers.length}>{empty}</td></tr> :
           children}
        </tbody>
      </table>
    </div>
  );
}

// ─── KPI Card ─────────────────────────────────────────────────────────────
function KPICard({ label, value, sub, icon, accent }) {
  const accents = {
    indigo: { ring:'border-indigo-100', icon:'bg-indigo-50 text-indigo-500' },
    emerald:{ ring:'border-emerald-100', icon:'bg-emerald-50 text-emerald-500' },
    amber:  { ring:'border-amber-100',  icon:'bg-amber-50 text-amber-500'   },
    red:    { ring:'border-red-100',    icon:'bg-red-50 text-red-500'       },
    purple: { ring:'border-purple-100', icon:'bg-purple-50 text-purple-500' },
  };
  const a = accents[accent] || accents.indigo;
  return (
    <Card className={`card-hover p-5 border ${a.ring}`}>
      <div className="flex items-start justify-between gap-3">
        <div className="min-w-0">
          <p className="text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wide">{label}</p>
          <p className="text-2xl font-bold text-slate-800 truncate">{value}</p>
          {sub && <p className="text-xs text-slate-400 mt-1">{sub}</p>}
        </div>
        <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0 ${a.icon}`}>
          {icon}
        </div>
      </div>
    </Card>
  );
}

// ─── Charts ────────────────────────────────────────────────────────────────
function DonutChart({ data, onCategoryClick }) {
  const ref  = useRef(null);
  const inst = useRef(null);

  useEffect(() => {
    if (!data || !data.length || !ref.current) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, {
      type: 'doughnut',
      data: {
        labels: data.map(d => CATEGORY_LABEL[d.category] || d.category),
        datasets: [{ data: data.map(d => d.total_amount), backgroundColor: data.map(d => CATEGORY_COLOR[d.category] || '#94A3B8'), borderWidth: 2, borderColor: '#fff', hoverOffset: 6 }],
      },
      options: {
        cutout: '72%',
        plugins: { legend:{ display:false }, tooltip:{ callbacks:{ label: c => ` ${c.label}: ${fmt.money(c.raw)}` } } },
        animation: { duration: 700 },
        onClick: (evt, elements) => {
          if (elements.length > 0 && onCategoryClick) {
            const idx = elements[0].index;
            onCategoryClick(data[idx].category);
          }
        },
      },
    });
    return () => { if (inst.current) inst.current.destroy(); };
  }, [JSON.stringify(data)]);

  if (!data || !data.length) return <EmptyState icon={<Icon name="chart-bar" size={48} />} title="Sin datos" desc="Concilia recibos para ver el desglose." />;

  const total = data.reduce((s, d) => s + d.total_amount, 0);
  return (
    <div className="flex items-center gap-6">
      <div className="relative flex-shrink-0" style={{ width:140, height:140 }}>
        <canvas ref={ref} />
        <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
          <span className="text-xs text-slate-400 font-medium">Total</span>
          <span className="text-sm font-bold text-slate-700">{fmt.money(total)}</span>
        </div>
      </div>
      <div className="flex flex-col gap-2 flex-1 min-w-0">
        {data.slice(0, 6).map(d => {
          const pct = total > 0 ? (d.total_amount / total) * 100 : 0;
          return (
            <div key={d.category} className={'space-y-0.5 ' + (onCategoryClick ? 'cursor-pointer hover:bg-slate-50 rounded-lg px-1 -mx-1 py-0.5' : '')}
              onClick={() => onCategoryClick && onCategoryClick(d.category)}>
              <div className="flex items-center gap-2 text-xs">
                <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ background: CATEGORY_COLOR[d.category] || '#94A3B8' }}></span>
                <span className="text-slate-500 flex-1 truncate">{CATEGORY_LABEL[d.category] || d.category}</span>
                <span className="font-semibold text-slate-700 flex-shrink-0">{fmt.money(d.total_amount)}</span>
              </div>
              <div className="ml-4 h-1 bg-slate-100 rounded-full overflow-hidden">
                <div className="h-full rounded-full progress-bar" style={{ width: pct + '%', background: CATEGORY_COLOR[d.category] || '#94A3B8', opacity:0.7 }}></div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SpendersChart({ data, onEmployeeClick }) {
  const ref  = useRef(null);
  const inst = useRef(null);

  useEffect(() => {
    if (!data || !data.length || !ref.current) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, {
      type: 'bar',
      data: {
        labels: data.map(d => d.name.split(' ')[0]),
        datasets: [{
          label: 'Gasto',
          data: data.map(d => d.total_month),
          backgroundColor: data.map((_, i) => `hsla(${230 + i * 15}, 70%, 60%, 0.85)`),
          borderRadius: 8,
          borderSkipped: false,
        }],
      },
      options: {
        indexAxis: 'y',
        plugins: { legend: { display:false }, tooltip: { callbacks: { label: c => ' ' + fmt.money(c.raw) } } },
        scales: {
          x: { grid:{ color:'rgba(0,0,0,0.04)' }, ticks: { callback: v => fmt.money(v), font:{ size:10 }, color:'#94a3b8' }, border:{ display:false } },
          y: { grid:{ display:false }, ticks: { font:{ size:12 }, color:'#64748b' }, border:{ display:false } },

}

        api.get('/analytics/categories'),
        api.get('/analytics/top-spenders'),
        api.get('/alerts?resolved=false'),

      setSummary(s);

    setDemoLoading(true);

      setDemoStep('Cargando empleados y recibos…');
      await api.post('/seed', {});

      const sync = await api.post('/transactions/sync-mock', {});

      setDemoStep('Ejecutando conciliación IA…');

      toast.error('Error cargando demo');

      setDemoLoading(false);
      await load();

      <Spinner size="lg" />

    <div className="space-y-6 slide-up">

          <div className="flex items-center justify-between gap-4">
            <div>
              <p className="font-semibold text-indigo-800 text-sm">Bienvenido a ExpensIQ</p>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div className="cursor-pointer" onClick={() => onNavigate('receipts')}>
          <KPICard label="Gasto Total"      value={fmt.money(summary && summary.total_spending)} sub={(summary && summary.receipt_count || 0) + ' recibos totales'}           icon={<Icon name="wallet" size={20} />} accent="indigo"  />
        </div>
        <div className="cursor-pointer" onClick={() => onNavigate('receipts', { status: 'matched' })}>
          <KPICard label="Conciliados"      value={summary && summary.matched_count || 0}        sub={pctMatched + '% del total'}                                              icon={<Icon name="check-circle" size={20} />} accent="emerald" />
        </div>
        <div className="cursor-pointer" onClick={() => onNavigate('receipts', { status: 'review' })}>
          <KPICard label="En Revisión"      value={(summary && summary.review_count || 0) + (summary && summary.pending_count || 0)} sub={(summary && summary.flagged_count || 0) + ' marcados'} icon={<Icon name="search" size={20} />} accent="amber" />
        </div>
        <div className="cursor-pointer" onClick={() => onNavigate('alerts')}>
          <KPICard label="Alertas Activas"  value={summary && summary.open_alert_count || 0}     sub={(summary && summary.unmatched_txn_count || 0) + ' txns sin recibo'}       icon={<Icon name="exclamation-triangle" size={20} />} accent="red"    />

      <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">

          action={alerts.length > 0 ? <Btn variant="ghost" size="sm" onClick={() => onNavigate('alerts')}>Ver todas →</Btn> : null}
        />
        {alerts.length === 0 ? (
          <div className="text-center py-8">
            <div className="mb-2 text-emerald-400"><Icon name="check-circle" size={40} /></div>

              </div>
            ))}
          </div>
        )}

    </div>
  );
}

// ─── Receipts Page ─────────────────────────────────────────────────────────
function ReceiptsPage({ onNavigate, params }) {
  const [receipts,  setReceipts]  = useState([]);
  const [employees, setEmployees] = useState([]);
  const [empMap,    setEmpMap]    = useState({});
  const [loading,   setLoading]   = useState(true);
  const [filter,    setFilter]    = useState(params?.status || 'all');
  const [uploading, setUploading] = useState(false);
  const [dragging,  setDragging]  = useState(false);
  const [form,      setForm]      = useState({ employee_id:'', merchant:'', amount:'' });
  const [selectedReceipt, setSelectedReceipt] = useState(null);
  const fileRef = useRef(null);

  // Advanced filters
  const [filterEmployee, setFilterEmployee] = useState(params?.employee_id || '');
  const [filterCategory, setFilterCategory] = useState(params?.category || '');
  const [filterDateFrom, setFilterDateFrom] = useState('');
  const [filterDateTo,   setFilterDateTo]   = useState('');
  const [filterSearch,   setFilterSearch]   = useState('');
  const [showFilters,    setShowFilters]    = useState(!!(params?.employee_id || params?.category));

  const buildQuery = useCallback(() => {
    let q = '/receipts?limit=200';
    if (filter !== 'all') q += '&status=' + filter;
    if (filterEmployee) q += '&employee_id=' + filterEmployee;
    if (filterCategory) q += '&category=' + filterCategory;
    if (filterDateFrom) q += '&date_from=' + filterDateFrom;
    if (filterDateTo)   q += '&date_to=' + filterDateTo;
    if (filterSearch)   q += '&search=' + encodeURIComponent(filterSearch);
    return q;
  }, [filter, filterEmployee, filterCategory, filterDateFrom, filterDateTo, filterSearch]);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [r, e] = await Promise.all([api.get(buildQuery()), api.get('/employees')]);
      const recs = Array.isArray(r) ? r : [];
      const emps = Array.isArray(e) ? e : [];
      setReceipts(recs);
      setEmployees(emps);
      const map = {};
      emps.forEach(emp => { map[String(emp.id)] = emp; });
      setEmpMap(map);
      if (emps.length > 0 && !form.employee_id) setForm(f => ({ ...f, employee_id: emps[0].id }));
    } catch(e) { toast.error('Error cargando recibos'); }
    finally { setLoading(false); }
  }, [buildQuery]);

  useEffect(() => { load(); }, [filter, filterEmployee, filterCategory, filterDateFrom, filterDateTo, filterSearch]);

  const handleUpload = async (file) => {
    if (!file) return;
    if (!form.employee_id) { toast.error('Selecciona un empleado primero'); return; }
    setUploading(true);
    try {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('employee_id', form.employee_id);
      if (form.merchant) fd.append('merchant', form.merchant);
      if (form.amount)   fd.append('amount',   form.amount);
      await api.upload('/receipts/upload', fd);
      toast.success('Recibo subido — OCR procesando en segundo plano');
      setForm(f => ({ ...f, merchant:'', amount:'' }));
      if (fileRef.current) fileRef.current.value = '';
      setTimeout(load, 2000);
    } catch(e) { toast.error('Error al subir recibo'); }
    finally { setUploading(false); }
  };

  const clearFilters = () => {
    setFilterEmployee('');
    setFilterCategory('');
    setFilterDateFrom('');
    setFilterDateTo('');
    setFilterSearch('');
  };

  const hasActiveFilters = filterEmployee || filterCategory || filterDateFrom || filterDateTo || filterSearch;

  const totalAmount = receipts.reduce((s, r) => s + (r.amount || 0), 0);

  const INPUT_CLS = "w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white";

  return (
    <div className="space-y-5 slide-up">
      <Card className="p-5">
        <SectionHeader title="Subir Recibo" subtitle="Sube una imagen o PDF para extraer datos automáticamente con OCR" />
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1.5">Empleado *</label>
            <select value={form.employee_id} onChange={e => setForm(f => ({ ...f, employee_id: e.target.value }))} className={INPUT_CLS}>
              {employees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1.5">Comercio (opcional)</label>
            <input type="text" placeholder="Ej: Amazon, Uber…" value={form.merchant}
              onChange={e => setForm(f => ({ ...f, merchant: e.target.value }))} className={INPUT_CLS} />
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1.5">Importe (opcional)</label>
            <input type="number" step="0.01" placeholder="0.00" value={form.amount}
              onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} className={INPUT_CLS} />
          </div>
        </div>
        <div
          className={'upload-zone border-2 border-dashed rounded-2xl p-10 text-center cursor-pointer ' + (dragging ? 'drag-over' : 'border-slate-200 hover:border-indigo-300 hover:bg-indigo-50/30')}
          onClick={() => !uploading && fileRef.current && fileRef.current.click()}
          onDragOver={e => { e.preventDefault(); setDragging(true); }}
          onDragLeave={() => setDragging(false)}
          onDrop={e => { e.preventDefault(); setDragging(false); const f = e.dataTransfer.files[0]; if(f) handleUpload(f); }}>
          {uploading
            ? <div className="flex flex-col items-center gap-3"><Spinner size="lg" /><p className="text-sm text-slate-500 font-medium">Subiendo y procesando OCR…</p></div>
            : <div>
                <div className="mb-3 text-slate-400"><Icon name="upload" size={40} /></div>
                <p className="text-sm font-semibold text-slate-600">Arrastra tu recibo aquí</p>
                <p className="text-xs text-slate-400 mt-1">o haz clic para seleccionar · JPG, PNG, PDF · máx 10MB</p>
              </div>
          }
          <input ref={fileRef} type="file" accept="image/*,.pdf" className="hidden"
            onChange={e => { const f = e.target.files && e.target.files[0]; if(f) handleUpload(f); }} />
        </div>
      </Card>

      {/* Advanced Filters */}
      <Card className="p-4">
        <div className="flex items-center justify-between mb-3">

                <td className="px-4 py-3">

                    ? <div className="flex items-center gap-2">

            );

        </Table>
      </Card>

      {selectedReceipt && (
        <ReceiptDetailModal receipt={selectedReceipt} empMap={empMap} onClose={() => setSelectedReceipt(null)} onNavigate={onNavigate} />
      )}
    </div>
  );
}

// ─── Transactions Page ──────────────────────────────────────────────────────
function TransactionsPage() {
  const [txns,        setTxns]        = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [syncing,     setSyncing]     = useState(false);
  const [reconciling, setReconciling] = useState(false);
  const [lastResult,  setLastResult]  = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const t = await api.get('/transactions');
      setTxns(Array.isArray(t) ? t : []);
    } catch(e) { toast.error('Error cargando transacciones'); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, []);

  const handleSync = async () => {
    setSyncing(true);
    try {
      const r = await api.post('/transactions/sync-mock', {});
      toast.success(r.created + ' transacciones importadas (' + r.skipped + ' omitidas)');
      await load();
    } catch(e) { toast.error('Error sincronizando banco'); }
    finally { setSyncing(false); }
  };

  const handleReconcile = async () => {
    setReconciling(true);
    try {
      const r = await api.post('/transactions/reconcile-all', {});
      setLastResult(r);
      toast.success('Conciliación: ' + r.matches_created + ' matches · ' + r.alerts_created + ' alertas');
      await load();
    } catch(e) { toast.error('Error en conciliación'); }
    finally { setReconciling(false); }
  };

  const totalAmount = txns.reduce((s, t) => s + (t.amount || 0), 0);

  return (
    <div className="space-y-5 slide-up">
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <KPICard label="Transacciones"    value={txns.length}          sub="importadas del banco"            icon={<Icon name="credit-card" size={20} />} accent="indigo"  />
        <KPICard label="Volumen Total"     value={fmt.money(totalAmount)} sub="en todas las cuentas"           icon={<Icon name="wallet" size={20} />} accent="emerald" />
        <KPICard label="Último Resultado" value={lastResult ? lastResult.matches_created + ' matches' : '—'} sub={lastResult ? lastResult.alerts_created + ' alertas generadas' : 'Ejecuta conciliación'} icon={<Icon name="bolt" size={20} />} accent="purple" />
      </div>

      <Card className="p-4">
        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
          <div>
            <h3 className="text-sm font-semibold text-slate-700">Integración Bancaria</h3>
            <p className="text-xs text-slate-400 mt-0.5">Sincroniza y concilia transacciones con recibos automáticamente</p>
          </div>
          <div className="flex gap-2 flex-wrap">
            <Btn variant="secondary" onClick={handleSync} loading={syncing}><Icon name="arrow-path" size={16} /> Sincronizar Banco</Btn>
            <Btn onClick={handleReconcile} loading={reconciling}><Icon name="bolt" size={16} /> Conciliar Todo</Btn>
          </div>
        </div>
        {lastResult && (
          <div className="mt-3 flex flex-wrap items-center gap-3 pt-3 border-t border-slate-100">
            <span className="text-xs text-slate-400">Último resultado:</span>
            <span className="badge bg-slate-100 text-slate-600"><Icon name="receipt" size={12} /> {lastResult.receipts_processed} recibos</span>
            <span className="badge bg-emerald-50 text-emerald-700"><Icon name="check" size={12} /> {lastResult.matches_created} matches</span>
            <span className="badge bg-amber-50 text-amber-700"><Icon name="exclamation-triangle" size={12} /> {lastResult.alerts_created} alertas</span>
          </div>
        )}
      </Card>

      <Card>
        <Table
          headers={['Comercio', 'Fecha', 'Importe', 'Cuenta', 'ID Externo']}
          loading={loading}
          empty={txns.length === 0 ? <EmptyState icon={<Icon name="credit-card" size={48} />} title="Sin transacciones" desc='Haz clic en "Sincronizar Banco" para importar transacciones de prueba.' /> : null}>
          {txns.map(t => (
            <tr key={t.id} className="row-hover border-t border-slate-50">
              <td className="px-4 py-3 text-sm font-semibold text-slate-800">{t.merchant || '—'}</td>
              <td className="px-4 py-3 text-sm text-slate-500 whitespace-nowrap">{fmt.date(t.date)}</td>
              <td className="px-4 py-3 text-sm font-bold text-slate-800">{fmt.money(t.amount, t.currency)}</td>
              <td className="px-4 py-3">
                <span className="text-xs font-mono bg-slate-100 text-slate-600 px-2 py-0.5 rounded">{t.account_id || '—'}</span>
              </td>
              <td className="px-4 py-3 text-xs text-slate-400 font-mono">{t.external_id || '—'}</td>
            </tr>
          ))}
        </Table>
      </Card>
    </div>
  );
}

// ─── Alerts Page ────────────────────────────────────────────────────────────
function AlertsPage() {
  const [alerts,  setAlerts]  = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter,  setFilter]  = useState('active');

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const a = await api.get(filter === 'active' ? '/alerts?resolved=false' : '/alerts');
      setAlerts(Array.isArray(a) ? a : []);
    } catch(e) { toast.error('Error cargando alertas'); }
    finally { setLoading(false); }
  }, [filter]);

  useEffect(() => { load(); }, [filter]);

  const resolve  = async (id) => { try { await api.patch('/alerts/' + id + '/resolve', {}); toast.success('Alerta resuelta'); await load(); } catch(e) { toast.error('Error'); } };
  const markRead = async (id) => { try { await api.patch('/alerts/' + id + '/read', {}); await load(); } catch(e) {} };

  const SEVERITY = {
    policy_violation: { card:'border-red-200 bg-red-50',      badge:'bg-red-100 text-red-700'       },
    no_match:         { card:'border-amber-200 bg-amber-50',  badge:'bg-amber-100 text-amber-700'   },
    duplicate:        { card:'border-orange-200 bg-orange-50',badge:'bg-orange-100 text-orange-700' },
    no_receipt:       { card:'border-blue-200 bg-blue-50',    badge:'bg-blue-100 text-blue-700'     },
    rapid_repeat:     { card:'border-purple-200 bg-purple-50',badge:'bg-purple-100 text-purple-700' },
  };

  const counts = {};
  alerts.forEach(a => { counts[a.alert_type] = (counts[a.alert_type] || 0) + 1; });

  return (
    <div className="space-y-5 slide-up">
      {alerts.length > 0 && (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          {Object.entries(counts).map(([type, n]) => (
            <Card key={type} className="p-4">
              <p className="text-2xl font-black text-slate-800">{n}</p>
              <p className="text-xs text-slate-500 mt-0.5">{ALERT_LABEL[type] || type}</p>
            </Card>
          ))}
        </div>
      )}

      <Card className="p-4">
        <div className="flex items-center justify-between">
          <div>
            <h3 className="text-sm font-semibold text-slate-700">Sistema de Alertas</h3>
            <p className="text-xs text-slate-400 mt-0.5">Anomalías y excepciones detectadas por IA</p>
          </div>
          <div className="flex gap-2">
            {[['active','Activas'],['all','Todas']].map(([id, label]) => (
              <Btn key={id} variant={filter === id ? 'primary' : 'secondary'} size="sm" onClick={() => setFilter(id)}>{label}</Btn>
            ))}
          </div>
        </div>
      </Card>

      {loading
        ? <div className="flex justify-center py-12"><Spinner size="lg" /></div>
        : alerts.length === 0
          ? <Card className="p-6"><EmptyState icon={<Icon name="check-circle" size={48} />} title="Sin alertas" desc={filter === 'active' ? "No hay alertas activas. Todo en orden." : "No hay alertas registradas."} /></Card>
          : (
            <div className="space-y-3">
              {alerts.map(a => {
                const cfg = SEVERITY[a.alert_type] || { card:'border-slate-200 bg-slate-50', badge:'bg-slate-100 text-slate-600' };
                return (
                  <Card key={a.id} className={'p-4 border ' + cfg.card}>
                    <div className="flex items-start gap-3">
                      <span className="text-2xl flex-shrink-0 mt-0.5">{<Icon name={ALERT_ICON_NAME[a.alert_type] || 'exclamation-triangle'} size={20} />}</span>
                      <div className="flex-1 min-w-0">
                        <div className="flex flex-wrap items-center gap-2 mb-1.5">
                          <span className={'badge ' + cfg.badge}>{ALERT_LABEL[a.alert_type] || a.alert_type}</span>
                          {!a.is_read && <span className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>}
                          {a.resolved && <span className="badge bg-emerald-100 text-emerald-700">✓ Resuelta</span>}
                        </div>
                        <p className="text-sm font-medium text-slate-700">{a.description}</p>
                        <p className="text-xs text-slate-400 mt-1">{fmt.rel(a.created_at)}</p>
                      </div>
                      <div className="flex gap-2 flex-shrink-0">
                        {!a.is_read && !a.resolved && (
                          <Btn variant="ghost" size="sm" onClick={() => markRead(a.id)}>Leída</Btn>
                        )}
                        {!a.resolved && (
                          <Btn variant="secondary" size="sm" onClick={() => resolve(a.id)}>Resolver</Btn>
                        )}
                      </div>
                    </div>
                  </Card>
                );
              })}
            </div>
          )
      }
    </div>
  );
}

        {/* Bank Match Comparison */}
        <div className="px-5 pb-5">
          <h3 className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Conciliación Bancaria</h3>
          {loading ? (
            <div className="flex justify-center py-6"><Spinner size="md" /></div>
          ) : match ? (
            <div className="border border-emerald-200 bg-emerald-50 rounded-xl p-4">
              <div className="flex items-center gap-2 mb-3">
                <span className="badge bg-emerald-100 text-emerald-700">✓ Match encontrado</span>
                <span className="text-xs text-emerald-600">Confianza: {match.confidence != null ? fmt.pct(match.confidence) : '—'}</span>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <p className="text-xs font-semibold text-slate-500 mb-2 flex items-center gap-1"><Icon name="receipt" size={14} /> Recibo dice:</p>
                  <div className="space-y-1 text-sm">
                    <p><span className="text-slate-400">Comercio:</span> <span className="font-medium">{receipt.merchant || '—'}</span></p>
                    <p><span className="text-slate-400">Importe:</span> <span className="font-medium">{fmt.money(receipt.amount, receipt.currency)}</span></p>
                    <p><span className="text-slate-400">Fecha:</span> <span className="font-medium">{fmt.date(receipt.date)}</span></p>
                  </div>
                </div>
                <div>
                  <p className="text-xs font-semibold text-slate-500 mb-2 flex items-center gap-1"><Icon name="bank" size={14} /> Banco dice:</p>
                  <div className="space-y-1 text-sm">
                    <p><span className="text-slate-400">Comercio:</span> <span className="font-medium">{match.transaction_merchant || '—'}</span></p>
                    <p><span className="text-slate-400">Importe:</span> <span className="font-medium">{fmt.money(match.transaction_amount, match.transaction_currency)}</span></p>
                    <p><span className="text-slate-400">Fecha:</span> <span className="font-medium">{fmt.date(match.transaction_date)}</span></p>
                  </div>
                </div>
              </div>
            </div>
          ) : (
            <div className="border border-dashed border-amber-200 bg-amber-50 rounded-xl p-4 text-center">
              <span className="text-amber-500"><Icon name="search" size={28} /></span>
              <p className="text-sm text-amber-700 mt-1">Sin match bancario</p>
              <p className="text-xs text-amber-500 mt-0.5">Ejecuta la conciliación para buscar transacciones coincidentes</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Employee Profile Page ────────────────────────────────────────────────
function EmployeeProfilePage({ onNavigate, params }) {
  const [employee, setEmployee] = useState(null);
  const [loading, setLoading]   = useState(true);
  const [expanded, setExpanded] = useState({});
  const [selectedReceipt, setSelectedReceipt] = useState(null);

  useEffect(() => {
    if (!params || !params.employee_id) return;
    api.get('/employees/' + params.employee_id)
      .then(e => setEmployee(e))
      .catch(() => toast.error('Error cargando perfil'))
      .finally(() => setLoading(false));
  }, [params]);

  const toggleCategory = (cat) => setExpanded(p => ({ ...p, [cat]: !p[cat] }));

  const initials = n => n ? n.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() : '?';
  const avatarBg = n => ['bg-indigo-500','bg-blue-500','bg-emerald-500','bg-amber-500','bg-pink-500','bg-purple-500'][(n ? n.charCodeAt(0) : 0) % 6];

  if (loading) return (
    <div className="flex flex-col items-center justify-center h-72 gap-3">
      <Spinner size="lg" />
      <p className="text-sm text-slate-400">Cargando perfil…</p>
    </div>
  );

  if (!employee) return <EmptyState icon={<Icon name="user" size={48} />} title="Empleado no encontrado" desc="No se pudo cargar el perfil del empleado." />;

  const budgetPct = employee.monthly_budget > 0 ? Math.min(100, Math.round((employee.total_spending / employee.monthly_budget) * 100)) : 0;
  const budgetOver = employee.monthly_budget > 0 && employee.total_spending > employee.monthly_budget;

  return (
    <div className="space-y-5 slide-up">
      <Btn variant="ghost" size="sm" onClick={() => onNavigate('employees')}>← Volver a Empleados</Btn>

      {/* Employee Header */}
      <Card className="p-6">
        <div className="flex items-start gap-5">
          <div className={'w-16 h-16 ' + avatarBg(employee.name) + ' rounded-2xl flex items-center justify-center text-white text-xl font-bold flex-shrink-0'}>
            {initials(employee.name)}
          </div>
          <div className="flex-1 min-w-0">
            <h2 className="text-xl font-bold text-slate-800">{employee.name}</h2>
            <p className="text-sm text-slate-500">{employee.email}</p>
            <div className="flex flex-wrap gap-2 mt-2">
              {employee.department && <span className="badge bg-indigo-100 text-indigo-700">{employee.department}</span>}
              <span className="badge bg-slate-100 text-slate-600">{employee.role}</span>
            </div>
          </div>
        </div>
      </Card>

      {/* Stats */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <KPICard label="Gasto Total"    value={fmt.money(employee.total_spending)} sub={employee.receipt_count + ' recibos'}           icon={<Icon name="wallet" size={20} />} accent="indigo"  />
        <KPICard label="Conciliados"    value={employee.matched_count || 0}         sub="recibos verificados"                            icon={<Icon name="check-circle" size={20} />} accent="emerald" />
        <KPICard label="Pendientes"     value={employee.pending_count || 0}         sub="por procesar"                                   icon={<Icon name="clock" size={20} />} accent="amber"   />
        <KPICard label="Presupuesto"    value={employee.monthly_budget ? fmt.money(employee.monthly_budget) : 'Sin límite'} sub={employee.monthly_budget ? budgetPct + '% utilizado' : '—'} icon={<Icon name="chart-bar" size={20} />} accent={budgetOver ? 'red' : 'purple'} />
      </div>

      {/* Budget Bar */}
      {employee.monthly_budget > 0 && (
        <Card className="p-4">
          <div className="flex items-center justify-between mb-2">
            <span className="text-sm font-semibold text-slate-700">Uso del Presupuesto</span>
            <span className={'text-sm font-bold ' + (budgetOver ? 'text-red-600' : 'text-indigo-600')}>{budgetPct}%</span>
          </div>
          <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden">
            <div className={'h-full rounded-full progress-bar ' + (budgetOver ? 'bg-red-500' : 'bg-gradient-to-r from-indigo-500 to-emerald-500')} style={{ width: Math.min(100, budgetPct) + '%' }}></div>
          </div>
          <div className="flex items-center justify-between mt-1.5">
            <span className="text-xs text-slate-400">{fmt.money(employee.total_spending)} gastado</span>
            <span className="text-xs text-slate-400">{fmt.money(employee.monthly_budget)} límite</span>
          </div>
        </Card>
      )}

      {/* Employee Category Distribution Donut */}
      {employee.category_breakdown.length > 0 && (
        <Card className="p-5">
          <SectionHeader title="Distribución por Categoría" subtitle="Proporción de gasto por tipo" />
          <DonutChart data={employee.category_breakdown} onCategoryClick={(cat) => onNavigate('receipts', { employee_id: employee.id, category: cat })} />
        </Card>
      )}

      {/* Category Breakdown */}
      <SectionHeader title="Desglose por Categoría" subtitle={employee.category_breakdown.length + ' categorías con gastos'} />
      {employee.category_breakdown.length === 0 ? (
        <Card className="p-6"><EmptyState icon={<Icon name="folder" size={48} />} title="Sin gastos" desc="Este empleado no tiene recibos registrados." /></Card>
      ) : (
        <div className="space-y-3">
          {employee.category_breakdown.map(cat => {
            const isOpen = expanded[cat.category];
            const color = CATEGORY_COLOR[cat.category] || '#94A3B8';
            return (
              <Card key={cat.category} className="overflow-hidden">
                <button onClick={() => toggleCategory(cat.category)}
                  className="w-full flex items-center gap-4 p-4 hover:bg-slate-50 transition-colors text-left">
                  <div className="w-3 h-3 rounded-full flex-shrink-0" style={{ background: color }}></div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-semibold text-slate-800">{CATEGORY_LABEL[cat.category] || cat.category}</p>
                    <p className="text-xs text-slate-400">{cat.receipt_count} recibo{cat.receipt_count !== 1 ? 's' : ''}</p>
                  </div>
                  <span className="text-sm font-bold text-slate-800">{fmt.money(cat.total_amount)}</span>
                  <span className={'text-slate-400 transition-transform ' + (isOpen ? 'rotate-180' : '')}>▾</span>
                </button>
                {isOpen && (
                  <div className="border-t border-slate-100">
                    <table className="w-full">
                      <thead>
                        <tr className="bg-slate-50/80">
                          <th className="text-left px-4 py-2 text-xs font-semibold text-slate-400 uppercase">Comercio</th>
                          <th className="text-left px-4 py-2 text-xs font-semibold text-slate-400 uppercase">Fecha</th>
                          <th className="text-left px-4 py-2 text-xs font-semibold text-slate-400 uppercase">Importe</th>
                          <th className="text-left px-4 py-2 text-xs font-semibold text-slate-400 uppercase">Estado</th>
                          <th className="text-left px-4 py-2 text-xs font-semibold text-slate-400 uppercase">OCR</th>
                        </tr>
                      </thead>
                      <tbody>
                        {cat.receipts.map(r => (
                          <tr key={r.id} className="row-hover border-t border-slate-50 cursor-pointer" onClick={() => {
                            api.get('/receipts/' + r.id).then(full => setSelectedReceipt(full)).catch(() => toast.error('Error cargando recibo'));
                          }}>
                            <td className="px-4 py-2.5 text-sm font-medium text-slate-700">{r.merchant || <span className="text-slate-400 italic">Sin datos</span>}</td>
                            <td className="px-4 py-2.5 text-sm text-slate-500">{fmt.date(r.date)}</td>
                            <td className="px-4 py-2.5 text-sm font-bold text-slate-800">{r.amount != null ? fmt.money(r.amount, r.currency) : '—'}</td>
                            <td className="px-4 py-2.5"><StatusBadge status={r.status} /></td>
                            <td className="px-4 py-2.5">
                              {r.ocr_confidence != null ? (
                                <div className="flex items-center gap-1.5">
                                  <div className="w-12 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                    <div className="h-full rounded-full" style={{ width: fmt.pct(r.ocr_confidence), background: r.ocr_confidence > 0.8 ? '#10B981' : r.ocr_confidence > 0.5 ? '#F59E0B' : '#EF4444' }}></div>
                                  </div>
                                  <span className="text-xs text-slate-500">{fmt.pct(r.ocr_confidence)}</span>
                                </div>
                              ) : <span className="text-xs text-slate-300">—</span>}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}

      {selectedReceipt && (
        <ReceiptDetailModal receipt={selectedReceipt} empMap={{ [String(employee.id)]: employee }} onClose={() => setSelectedReceipt(null)} onNavigate={onNavigate} />
      )}
    </div>
  );
}

// ─── Page Meta ──────────────────────────────────────────────────────────────
const PAGE_META = {
  dashboard:        { title:'Dashboard',       subtitle:'Resumen y estado del sistema'             },
  receipts:         { title:'Recibos',         subtitle:'Gestión y carga de tickets de gasto'      },
  transactions:     { title:'Transacciones',   subtitle:'Integración bancaria y conciliación'      },
  alerts:           { title:'Alertas',         subtitle:'Anomalías y excepciones detectadas por IA'},
  employees:        { title:'Empleados',       subtitle:'Directorio y presupuestos mensuales'      },
  employee_profile: { title:'Perfil Empleado', subtitle:'Desglose de gastos por categoría'         },
};

const PAGE_MAP = { dashboard: DashboardPage, receipts: ReceiptsPage, transactions: TransactionsPage, alerts: AlertsPage, employees: EmployeesPage, employee_profile: EmployeeProfilePage };

// ─── App ────────────────────────────────────────────────────────────────────
function App() {
  const [page,       setPage]       = useState('dashboard');
  const [pageParams, setPageParams] = useState({});
  const [alertCount, setAlertCount] = useState(0);
  const [ready,      setReady]      = useState(false);

  const refreshAlerts = useCallback(() => {
    api.get('/alerts?resolved=false').then(a => setAlertCount(Array.isArray(a) ? a.length : 0)).catch(() => {});
  }, []);

  useEffect(() => {
    fetch(API.replace('/api/v1','') + '/health')
      .then(() => {
        refreshAlerts();
        setReady(true);
      })
      .catch(() => {
        toast.error('No se puede conectar al servidor en :8000');
        setReady(true);
      });
  }, []);

  const navigate = useCallback((p, params = {}) => {
    setPage(p);
    setPageParams(params);
    if (p !== 'alerts') refreshAlerts();
  }, [refreshAlerts]);

  if (!ready) return (
    <div className="h-screen bg-slate-900 flex flex-col items-center justify-center gap-4">
      <div className="w-14 h-14 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-indigo-900">
        <span className="text-white font-black text-xl">EQ</span>
      </div>
      <Spinner size="lg" color="text-indigo-400" />
      <p className="text-slate-400 text-sm">Iniciando ExpensIQ…</p>
    </div>
  );

  const PageComp = PAGE_MAP[page] || DashboardPage;
  const meta     = PAGE_META[page] || {};
  const sidebarPage = page === 'employee_profile' ? 'employees' : page;

  return (
    <div className="flex min-h-screen">
      <Sidebar page={sidebarPage} setPage={navigate} alertCount={alertCount} />

      <div className="flex-1 ml-56 flex flex-col min-h-screen">
        <header className="sticky top-0 z-10 bg-white/80 backdrop-blur border-b border-slate-200/80 px-7 py-4 flex items-center justify-between">
          <div>
            <h1 className="text-lg font-bold text-slate-800">{meta.title}</h1>
            <p className="text-xs text-slate-400">{meta.subtitle}</p>
          </div>
          <div className="flex items-center gap-4">
            <div className="hidden md:flex items-center gap-1.5 text-xs text-slate-400 bg-slate-50 border border-slate-200 rounded-full px-3 py-1.5">
              <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
              Sistema activo
            </div>
            <div className="text-xs text-slate-400 hidden lg:block">
              {new Date().toLocaleDateString('es-ES', { weekday:'short', day:'numeric', month:'short', year:'numeric' })}
            </div>
          </div>
        </header>

        <main className="flex-1 p-7">
          <PageComp key={page + JSON.stringify(pageParams)} onNavigate={navigate} params={pageParams} />
        </main>

        <footer className="px-7 py-3 border-t border-slate-100 flex items-center justify-between">
          <p className="text-xs text-slate-300">ExpensIQ v1.0 · Gestión Inteligente de Gastos con IA</p>
          <div className="flex items-center gap-4">
            <a href="http://localhost:8000/docs" target="_blank" rel="noreferrer" className="text-xs text-indigo-400 hover:text-indigo-600 transition-colors">API Docs</a>
            <a href="http://localhost:9001" target="_blank" rel="noreferrer" className="text-xs text-indigo-400 hover:text-indigo-600 transition-colors">MinIO</a>
            <a href="http://localhost:3100" target="_blank" rel="noreferrer" className="text-xs text-indigo-400 hover:text-indigo-600 transition-colors">Metabase</a>
          </div>
        </footer>
      </div>

      <ToastContainer />
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error('React Error:', error, info); }
  render() {
    if (this.state.error) return (
      <div style={{padding:40,fontFamily:'monospace'}}>
        <h1 style={{color:'red'}}>Error de renderizado</h1>
        <pre style={{whiteSpace:'pre-wrap',background:'#f5f5f5',padding:20,borderRadius:8}}>{this.state.error.toString()}</pre>
      </div>
    );
    return this.props.children;
  }
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
} catch(e) {
  document.getElementById('root').innerHTML = '<pre style="padding:40px;color:red;font-family:monospace">Init Error: ' + e.message + '</pre>';
  console.error('Init Error:', e);
}
</script>
